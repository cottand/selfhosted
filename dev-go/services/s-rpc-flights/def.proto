syntax = "proto3";
package s_rpc_flights;

option go_package = "github.com/Cottand/selfosted/dev-go/lib/proto/s-rpc-flights";

import "google/protobuf/empty.proto";


service Flights {
  rpc ListAll(google.protobuf.Empty) returns (stream Flight);
  rpc EmissionsForJourney(Journey) returns (EmissionsForJourneyResponse);
}

message Flight {
  Airport src = 1;
  Airport dst = 2;
}

message Airport {
  string code = 1;
  double lat = 2;
  double lon = 3;
}

message Journey {
  string src_airport_code = 1;
  string dst_airport_code = 2;
}

message EmissionsForJourneyResponse {
  double CO2ekg = 1;
}